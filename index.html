<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DN - هوش مصنوعی تشخیص عدد</title>
    <style>
        /* ============================================================
                   RESET & BASE
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Playfair+Display:wght@400;700;900&display=swap');

        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --gold-light: #fff8dc;
            --dark: #0a0a0f;
            --dark-glass: rgba(10, 10, 15, 0.6);
            --shadow-gold: 0 0 60px rgba(255, 215, 0, 0.1);
            --speed: 0.5s;
        }

        body {
            font-family: 'Playfair Display', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
            min-height: 100vh;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            position: relative;
            cursor: default;
        }

        /* ============================================================
                   LOADING SCREEN - 100% FULLSCREEN
                   ============================================================ */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #ffd700;
            border-right-color: #ff6b00;
            animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
        }

        .loader-ring::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-bottom-color: #ffd700;
            border-left-color: #ff8c00;
            animation: spin 0.8s linear infinite reverse;
        }

        .loader-ring::after {
            content: 'DN';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            margin-top: 30px;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            letter-spacing: 6px;
            color: rgba(255, 215, 0, 0.4);
            animation: pulseText 1.5s ease-in-out infinite;
        }

        .loader-progress {
            width: 200px;
            height: 2px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ff6b00);
            border-radius: 2px;
            animation: progressLoad 3s ease-in-out forwards;
        }

        @keyframes progressLoad {
            0% {
                width: 0%;
            }
            80% {
                width: 80%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .loader-sub {
            margin-top: 10px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 3px;
            font-weight: 300;
        }

        /* ============================================================
                   پس‌زمینه سه‌بعدی
                   ============================================================ */
        .bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 215, 0, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 70%),
                radial-gradient(ellipse at 10% 80%, rgba(255, 100, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 20%, rgba(255, 100, 0, 0.02) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.03);
            }
        }

        /* ============================================================
                   ذرات هوشمند
                   ============================================================ */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ============================================================
                   حلقه‌های نوری چرخان (11 عدد)
                   ============================================================ */
        .light-rings {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.03);
            animation: ringSpin 25s linear infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .ring:nth-child(1) {
            width: 600px;
            height: 600px;
            border-color: rgba(255, 215, 0, 0.08);
            animation-duration: 30s;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.02);
        }
        .ring:nth-child(2) {
            width: 800px;
            height: 800px;
            border-color: rgba(255, 215, 0, 0.06);
            animation-duration: 40s;
            animation-direction: reverse;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.015);
        }
        .ring:nth-child(3) {
            width: 1000px;
            height: 1000px;
            border-color: rgba(255, 215, 0, 0.04);
            animation-duration: 50s;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.01);
        }
        .ring:nth-child(4) {
            width: 400px;
            height: 400px;
            border-color: rgba(255, 215, 0, 0.1);
            animation-duration: 20s;
            animation-direction: reverse;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.03);
        }
        .ring:nth-child(5) {
            width: 1200px;
            height: 1200px;
            border-color: rgba(255, 200, 50, 0.03);
            animation-duration: 60s;
            box-shadow: 0 0 120px rgba(255, 215, 0, 0.01);
        }
        .ring:nth-child(6) {
            width: 350px;
            height: 350px;
            border-color: rgba(255, 215, 0, 0.12);
            animation-duration: 15s;
            animation-direction: reverse;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.04);
        }
        .ring:nth-child(7) {
            width: 900px;
            height: 900px;
            border-color: rgba(255, 215, 0, 0.05);
            animation-duration: 45s;
            box-shadow: 0 0 90px rgba(255, 215, 0, 0.02);
        }
        .ring:nth-child(8) {
            width: 500px;
            height: 500px;
            border-color: rgba(255, 200, 100, 0.07);
            animation-duration: 22s;
            animation-direction: reverse;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.025);
        }
        .ring:nth-child(9) {
            width: 1500px;
            height: 1500px;
            border-color: rgba(255, 180, 50, 0.02);
            animation-duration: 70s;
            box-shadow: 0 0 150px rgba(255, 215, 0, 0.005);
        }
        .ring:nth-child(10) {
            width: 280px;
            height: 280px;
            border-color: rgba(255, 215, 0, 0.15);
            animation-duration: 12s;
            animation-direction: reverse;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.05);
        }
        .ring:nth-child(11) {
            width: 1600px;
            height: 1600px;
            border-color: rgba(255, 215, 0, 0.015);
            animation-duration: 80s;
            box-shadow: 0 0 160px rgba(255, 215, 0, 0.003);
        }

        @keyframes ringSpin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* ============================================================
                   افکت بخار و مه (7 لایه)
                   ============================================================ */
        .vapor-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .vapor {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.025) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 215, 0, 0.015) 0%, transparent 40%);
            animation: vaporMove 30s ease-in-out infinite;
            filter: blur(120px);
        }

        .vapor:nth-child(2) {
            background: radial-gradient(ellipse at 30% 60%, rgba(200, 180, 100, 0.015) 0%, transparent 50%);
            animation: vaporMove2 25s ease-in-out infinite;
            filter: blur(180px);
        }

        .vapor:nth-child(3) {
            background: radial-gradient(ellipse at 70% 20%, rgba(180, 200, 150, 0.01) 0%, transparent 50%);
            animation: vaporMove3 35s ease-in-out infinite;
            filter: blur(150px);
        }

        .vapor:nth-child(4) {
            background: radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.02) 0%, transparent 40%);
            animation: vaporMove 40s ease-in-out infinite reverse;
            filter: blur(200px);
        }

        .vapor:nth-child(5) {
            background: radial-gradient(ellipse at 10% 80%, rgba(200, 180, 80, 0.01) 0%, transparent 50%);
            animation: vaporMove2 28s ease-in-out infinite reverse;
            filter: blur(160px);
        }

        .vapor:nth-child(6) {
            background: radial-gradient(ellipse at 90% 10%, rgba(180, 200, 120, 0.008) 0%, transparent 50%);
            animation: vaporMove3 32s ease-in-out infinite reverse;
            filter: blur(140px);
        }

        .vapor:nth-child(7) {
            background: radial-gradient(ellipse at 60% 40%, rgba(255, 215, 0, 0.015) 0%, transparent 40%);
            animation: vaporMove 45s ease-in-out infinite;
            filter: blur(220px);
        }

        @keyframes vaporMove {
            0% {
                transform: translate(0%, 0%) scale(1);
                opacity: 0.4;
            }
            50% {
                transform: translate(-10%, -5%) scale(1.1);
                opacity: 0.7;
            }
            100% {
                transform: translate(0%, 0%) scale(1);
                opacity: 0.4;
            }
        }
        @keyframes vaporMove2 {
            0% {
                transform: translate(0%, 0%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(15%, -10%) scale(1.15);
                opacity: 0.6;
            }
            100% {
                transform: translate(0%, 0%) scale(1);
                opacity: 0.3;
            }
        }
        @keyframes vaporMove3 {
            0% {
                transform: translate(0%, 0%) scale(1);
                opacity: 0.2;
            }
            50% {
                transform: translate(-20%, -20%) scale(1.2);
                opacity: 0.5;
            }
            100% {
                transform: translate(0%, 0%) scale(1);
                opacity: 0.2;
            }
        }

        /* ============================================================
                   کانتینر اصلی
                   ============================================================ */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* ============================================================
                   کارت اصلی با افکت شیشه‌ای فوق‌پیشرفته
                   ============================================================ */
        .main-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(60px) saturate(1.8);
            -webkit-backdrop-filter: blur(60px) saturate(1.8);
            border-radius: 50px;
            padding: 60px 70px;
            max-width: 800px;
            width: 100%;
            border: 1px solid rgba(255, 215, 0, 0.06);
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.9),
                inset 0 0 120px rgba(255, 215, 0, 0.02),
                0 0 60px rgba(255, 215, 0, 0.03),
                0 0 120px rgba(255, 215, 0, 0.01);
            animation: cardFloat 6s ease-in-out infinite;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 215, 0, 0.05) 0%, transparent 50%);
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .main-card::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.05), transparent, rgba(255, 215, 0, 0.02), transparent);
            border-radius: 53px;
            z-index: -1;
            animation: borderGlow 5s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.8;
            }
        }

        .main-card:hover {
            box-shadow:
                0 60px 120px rgba(0, 0, 0, 0.9),
                inset 0 0 150px rgba(255, 215, 0, 0.05),
                0 0 80px rgba(255, 215, 0, 0.08),
                0 0 160px rgba(255, 215, 0, 0.02);
            transform: translateY(-5px) scale(1.01);
        }

        @keyframes cardFloat {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* ============================================================
                   لوگو DN
                   ============================================================ */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .logo-icon {
            font-size: 4rem;
            display: inline-block;
            animation: logoSpin 20s linear infinite;
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.15));
        }

        @keyframes logoSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .logo-dn {
            font-size: 6rem;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ffd700, #ff6b00, #ffd700, #ff8c00, #ffd700);
            background-size: 500% 500%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldGradient 4s ease-in-out infinite;
            text-shadow: 0 0 80px rgba(255, 215, 0, 0.15);
            letter-spacing: 20px;
            position: relative;
            display: inline-block;
        }

        .logo-dn::after {
            content: '✦';
            position: absolute;
            top: -30px;
            right: -50px;
            font-size: 2.5rem;
            color: #ffd700;
            animation: starPulse 2s ease-in-out infinite;
            -webkit-text-fill-color: initial;
        }

        .logo-dn::before {
            content: '✦';
            position: absolute;
            bottom: -30px;
            left: -50px;
            font-size: 2.5rem;
            color: #ffd700;
            animation: starPulse 2s ease-in-out infinite 0.5s;
            -webkit-text-fill-color: initial;
        }

        @keyframes goldGradient {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes starPulse {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.4) rotate(180deg);
            }
        }

        .logo-sub {
            color: rgba(255, 215, 0, 0.15);
            font-size: 0.9rem;
            letter-spacing: 12px;
            margin-top: 8px;
            font-weight: 300;
        }

        /* ============================================================
                   متن تبلیغاتی
                   ============================================================ */
        .ad-text {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .ad-text h2 {
            font-size: 3.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.08);
            line-height: 1.3;
        }

        .ad-text h2 .highlight {
            background: linear-gradient(135deg, #ffd700, #ff6b00, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldGradient 4s ease-in-out infinite;
        }

        .ad-text p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.2rem;
            margin-top: 15px;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .ad-text .glow-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            margin: 18px auto;
            border-radius: 2px;
            animation: linePulse 3s ease-in-out infinite;
        }

        @keyframes linePulse {
            0%,
            100% {
                width: 120px;
                opacity: 0.3;
            }
            50% {
                width: 250px;
                opacity: 1;
            }
        }

        /* ============================================================
                   دکمه ورود به DN
                   ============================================================ */
        .btn-dn {
            display: inline-block;
            padding: 22px 70px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ffd700, #f5a623, #ffd700, #ff8c00);
            background-size: 400% 400%;
            color: #000;
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            letter-spacing: 5px;
            position: relative;
            overflow: hidden;
            animation: btnGradient 4s ease-in-out infinite;
            text-decoration: none;
            z-index: 2;
            touch-action: manipulation;
        }

        .btn-dn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            animation: btnShine 6s ease-in-out infinite;
            transform: translateX(-100%);
        }

        @keyframes btnShine {
            0%,
            100% {
                transform: translateX(-100%) rotate(0deg);
            }
            50% {
                transform: translateX(100%) rotate(15deg);
            }
        }

        @keyframes btnGradient {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .btn-dn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.4), 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .btn-dn:active {
            transform: scale(0.95);
        }

        /* ============================================================
                   بخش توسعه‌دهندگان
                   ============================================================ */
        .developers-section {
            margin-top: 50px;
            padding-top: 35px;
            border-top: 1px solid rgba(255, 215, 0, 0.04);
            width: 100%;
            text-align: center;
        }

        .developers-title {
            color: rgba(255, 215, 0, 0.15);
            font-size: 0.7rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 18px;
            font-weight: 300;
            position: relative;
        }

        .developers-title::before,
        .developers-title::after {
            content: '';
            display: inline-block;
            width: 40px;
            height: 1px;
            background: rgba(255, 215, 0, 0.08);
            vertical-align: middle;
            margin: 0 18px;
        }

        .developers-list {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            padding: 10px 0;
        }

        .developer-item {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            padding: 8px 25px;
            border: 1px solid transparent;
            border-radius: 50px;
            font-weight: 300;
            position: relative;
        }

        .developer-item::before {
            content: '✦';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 215, 0, 0.08);
            font-size: 0.5rem;
        }

        .developer-item:first-child::before {
            display: none;
        }

        .developer-item:hover {
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.06);
            background: rgba(255, 215, 0, 0.02);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.02);
        }

        .developer-family {
            color: rgba(255, 215, 0, 0.08);
            font-size: 0.6rem;
            letter-spacing: 4px;
            margin-top: 12px;
            text-transform: uppercase;
        }

        /* ============================================================
                   انیمیشن‌های ورود
                   ============================================================ */
        .fade-in {
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }

        .fade-in:nth-child(1) {
            animation-delay: 0.1s;
        }
        .fade-in:nth-child(2) {
            animation-delay: 0.2s;
        }
        .fade-in:nth-child(3) {
            animation-delay: 0.3s;
        }
        .fade-in:nth-child(4) {
            animation-delay: 0.4s;
        }
        .fade-in:nth-child(5) {
            animation-delay: 0.5s;
        }
        .fade-in:nth-child(6) {
            animation-delay: 0.6s;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================================
                   پاسخگو
                   ============================================================ */
        @media (max-width: 768px) {
            .main-card {
                padding: 35px 25px;
                border-radius: 35px;
            }

            .logo-dn {
                font-size: 3.8rem;
                letter-spacing: 10px;
            }

            .logo-dn::after,
            .logo-dn::before {
                display: none;
            }

            .logo-icon {
                font-size: 2.8rem;
            }

            .ad-text h2 {
                font-size: 2rem;
            }

            .btn-dn {
                padding: 16px 40px;

            }

            .developers-list {
                gap: 20px;
                flex-direction: column;
                align-items: center;
            }

            .developer-item::before {
                display: none;
            }

            .light-rings {
                display: none;
            }

            .developers-title::before,
            .developers-title::after {
                width: 20px;
                margin: 0 10px;
            }
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 25px 16px;
                border-radius: 25px;
            }

            .logo-dn {
                font-size: 2.8rem;
                letter-spacing: 6px;
            }

            .ad-text h2 {
                font-size: 1.5rem;
            }

            .ad-text p {
                font-size: 0.9rem;
            }

            .btn-dn {
                padding: 14px 25px;
                font-size: 0.85rem;
                letter-spacing: 3px;
            }

            .developer-item {
                font-size: 0.8rem;
                padding: 5px 15px;
            }
        }

        /* ============================================================
                   اسکرول‌بار
                   ============================================================ */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 215, 0, 0.25);
        }

        /* ============================================================
                   افکت پیکسل (11,111,000,101,010,101,010 ویژگی!)
                   ============================================================ */
        .pixel-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.006) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.006) 1px, transparent 1px);
            background-size: 35px 35px;
            animation: pixelMove 40s linear infinite;
        }

        @keyframes pixelMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(35px, 35px);
            }
        }

        /* ============================================================
                   اثر گوی‌های نورانی (7 عدد)
                   ============================================================ */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .glow-orb:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -200px;
            background: rgba(255, 215, 0, 0.04);
            animation-delay: 0s;
        }

        .glow-orb:nth-child(2) {
            width: 600px;
            height: 600px;
            bottom: -250px;
            left: -250px;
            background: rgba(255, 215, 0, 0.03);
            animation-delay: -3s;
        }

        .glow-orb:nth-child(3) {
            width: 400px;
            height: 400px;
            top: 30%;
            left: 10%;
            background: rgba(255, 100, 0, 0.025);
            animation-delay: -6s;
        }

        .glow-orb:nth-child(4) {
            width: 450px;
            height: 450px;
            bottom: 20%;
            right: 10%;
            background: rgba(255, 215, 0, 0.03);
            animation-delay: -9s;
        }

        .glow-orb:nth-child(5) {
            width: 350px;
            height: 350px;
            top: 60%;
            left: 40%;
            background: rgba(255, 200, 50, 0.02);
            animation-delay: -4s;
        }

        .glow-orb:nth-child(6) {
            width: 550px;
            height: 550px;
            top: 10%;
            left: 50%;
            background: rgba(255, 215, 0, 0.02);
            animation-delay: -7s;
        }

        .glow-orb:nth-child(7) {
            width: 300px;
            height: 300px;
            bottom: 40%;
            right: 30%;
            background: rgba(255, 150, 0, 0.025);
            animation-delay: -11s;
        }

        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(50px, -40px) scale(1.2);
                opacity: 0.7;
            }
        }

        /* ============================================================
                   خط اسکن (3 خط)
                   ============================================================ */
        .scan-line {
            position: fixed;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.06), transparent);
            animation: scanLine 10s linear infinite;
            pointer-events: none;
            z-index: 5;
        }

        .scan-line:nth-child(2) {
            animation-delay: -3.3s;
            height: 1px;
            opacity: 0.5;
        }

        .scan-line:nth-child(3) {
            animation-delay: -6.6s;
            height: 1px;
            opacity: 0.3;
        }

        @keyframes scanLine {
            0% {
                top: 0;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                top: 100%;
                opacity: 0;
            }
        }

        /* ============================================================
                   ستاره‌های پس‌زمینه
                   ============================================================ */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: starTwinkle 2s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%,
            100% {
                opacity: 0.1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* ============================================================
                   شمارنده DN (پایین صفحه)
                   ============================================================ */
        .dn-counter {
            position: fixed;
            bottom: 25px;
            right: 30px;
            color: rgba(255, 215, 0, 0.03);
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            letter-spacing: 3px;
            z-index: 0;
            pointer-events: none;
            animation: counterPulse 4s ease-in-out infinite;
        }

        @keyframes counterPulse {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* ============================================================
                   متن "بارگذاری..." در لودینگ
                   ============================================================ */
        .loader-dots {
            display: inline-block;
            animation: dots 1.4s steps(4, end) infinite;
            content: '';
            width: 1.5em;
            text-align: left;
        }

        @keyframes dots {
            0% {
                content: '';
            }
            25% {
                content: '.';
            }
            50% {
                content: '..';
            }
            75% {
                content: '...';
            }
            100% {
                content: '';
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
        LOADING SCREEN (تا زمانی که سایت مقصد کامل لود شود)
        ============================================================ -->

        <div class="loader-ring"></div>

    </div>

    <!-- ============================================================
        پس‌زمینه‌ها و افکت‌ها (بیش از 11111000101010101010 ویژگی!)
        ============================================================ -->
    <div class="bg-3d"></div>
    <div class="pixel-effect"></div>
    <div class="stars" id="stars"></div>

    <div class="light-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="vapor-container">
        <div class="vapor"></div>
        <div class="vapor"></div>
        <div class="vapor"></div>
        <div class="vapor"></div>
        <div class="vapor"></div>
        <div class="vapor"></div>

    <div id="particles-js"></div>

    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <div class="scan-line"></div>
    <div class="scan-line"></div>

    <div class="dn-counter">✦ DN v4.0 ✦</div>

    <!-- ============================================================
        کانتینر اصلی
        ============================================================ -->
    <div class="container">
        <div class="main-card" id="mainCard">

            <!-- لوگو -->
            <div class="logo-container fade-in">
                <div class="logo-icon">✦</div>
                <div class="logo-dn">DN</div>
                <div class="logo-sub">DIGITAL NUMBER</div>
            </div>

            <!-- متن تبلیغاتی -->
            <div class="ad-text fade-in">
                <h2>
                    <span class="highlight">هوش مصنوعی</span><br>
                    تشخیص اعداد
                </h2>
                <div class="glow-line"></div>
                <p>✨ تجربه‌ای جالب در تشخیص اعداد با هوش مصنوعی</p>
            </div>

            <!-- دکمه ورود به DN -->
            <div class="fade-in" style="text-align:center; width:100%;">
                <a href="#" class="btn-dn" id="redirectBtn">
                    🚀 ورود به DN
                </a>
            </div>

            <!-- بخش توسعه‌دهندگان -->
            <div class="developers-section fade-in">
                <div class="developers-title">✦ توسعه‌دهندگان ✦</div>
                <div class="developers-list">
                    <span class="developer-item">Mr.Amir Hossein</span>
                    <span class="developer-item">Mrs.Mahdieh</span>
                    <span class="developer-item">Mr.Amir Mohammad</span>
                </div>
                <div class="developer-family">Malek Ahmadi ✦ Holy</div>
            </div>

        </div>
    </div>

    <!-- ============================================================
        اسکریپت‌ها
        ============================================================ -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js">
    </script>
    <script>
        // ============================================================
        // 1. ذرات هوشمند (200 ذره با رفتار پیشرفته)
        // ============================================================
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 200,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#ffd700"
                },
                "shape": {
                    "type": "circle"
                },
                "opacity": {
                    "value": 0.5,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 1,
                        "opacity_min": 0.05,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 2,
                        "size_min": 0.3,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffd700",
                    "opacity": 0.1,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": true,
                        "rotateX": 600,
                        "rotateY": 1200
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "repulse": {
                        "distance": 100,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    }
                }
            },
            "retina_detect": true
        });

        // ============================================================
        // 2. ستاره‌های پس‌زمینه (100 عدد)
        // ============================================================
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (Math.random() * 3 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = (Math.random() * 5) + 's';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starsContainer.appendChild(star);
        }

        // ============================================================
        // 3. افکت نور روی کارت با حرکت ماوس
        // ============================================================
        const card = document.getElementById('mainCard');
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            card.style.setProperty('--mouse-x', x + '%');
            card.style.setProperty('--mouse-y', y + '%');
        });

        // ============================================================
        // 4. لودینگ و هدایت به سایت DN
        // ============================================================
        const loadingScreen = document.getElementById('loading-screen');
        const redirectBtn = document.getElementById('redirectBtn');
        const TARGET_URL = 'https://dnai-1939.onrender.com';

        // هدایت با لودینگ
        function redirectWithLoading() {
            // نمایش لودینگ
            loadingScreen.classList.remove('hide');

            // بعد از 0.5 ثانیه هدایت
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 500);
        }

        // کلیک روی دکمه
        redirectBtn.addEventListener('click', function(e) {
            e.preventDefault();
            redirectWithLoading();
        });

        // کلیک روی کل صفحه (برای UX بهتر)
        document.addEventListener('click', function(e) {
            // اگر روی دکمه یا داخل کارت کلیک شده باشد
            const card = document.querySelector('.main-card');
            if (card.contains(e.target) && e.target !== redirectBtn) {
                redirectWithLoading();
            }
        });

        // ============================================================
        // 5. انیمیشن ورود المان‌ها
        // ============================================================
        document.querySelectorAll('.fade-in').forEach((el, i) => {
            const delay = 0.1 + (i * 0.08);
            el.style.animationDelay = delay + 's';
        });

        // ============================================================
        // 6. مخفی کردن لودینگ بعد از بارگذاری کامل صفحه
        // ============================================================
        window.addEventListener('load', function() {
            // لودینگ را بعد از 3 ثانیه مخفی کن (اگر کاربر هنوز کلیک نکرده)
            setTimeout(() => {
                loadingScreen.classList.add('hide');
            }, 3000);
        });

        // ============================================================
        // 7. کنسول لاگ
        // ============================================================
        console.log('✦ DN Platform - Digital Number ✦');
        console.log('Developed by:');
        console.log('  Mr.Amir Hossein Malek Ahmadi');
        console.log('  Mrs.Mahdieh Malek Ahmadi');
        console.log('  Mr.Amir Mohammad Malek Ahmadi');
        console.log('✦ Powered by DN v4.0 ✦');
        console.log('✦ 111,110,001,010,101,010,101,010 features ✦');

        // ============================================================
        // 8. قابلیت کلیک روی هر جای کارت برای رفتن به سایت
        // ============================================================
        // (قبلاً پیاده‌سازی شد)
    </script>
</body>
</html>
